  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141010; --surface: #201a17; --surface2: #261f1b;
      --border: #2e2420; --border-hi: #4a3828;
      --gold: #c9a55a; --gold-dim: #8a6e3a;
      --cream: #f0e6d2; --cream-dim: #c4b49a;
      --cream-muted: #7a6a58; --cream-faint: #3a3028;
      --radius: 18px;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 20px; color: var(--cream);
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, #2e1f0e22, transparent);
      -webkit-font-smoothing: antialiased;
    }
    .wrapper { width: 100%; max-width: 720px; display: flex; flex-direction: column; height: 100vh; }
    header {
      padding: 28px 0 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      animation: fadeDown 0.5s ease both; flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #c9a55a, #8a6020);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600;
      color: #1a1208; box-shadow: 0 2px 12px #c9a55a30;
    }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--cream); letter-spacing: 0.04em; line-height: 1; }
    .brand-sub { font-size: 10px; color: var(--cream-muted); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 3px; font-weight: 300; }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 11px; color: var(--cream-muted); letter-spacing: 0.04em;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 2.5s ease-in-out infinite; }
    #chat { flex: 1; overflow-y: auto; padding: 30px 0 20px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
    #empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; gap: 14px; padding-top: 40px; animation: fadeUp 0.7s ease 0.2s both;
    }
    .empty-glyph { font-family: 'Cormorant Garamond', serif; font-size: 48px; color: var(--gold); opacity: 0.7; line-height: 1; }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; color: var(--cream); text-align: center; letter-spacing: 0.01em; }
    .empty-sub { font-size: 13px; font-weight: 300; color: var(--cream-muted); text-align: center; max-width: 360px; line-height: 1.8; }
    .suggestions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }
    .suggestion-btn {
      font-size: 11px; font-weight: 400; color: var(--cream-dim);
      background: var(--surface); border: 1px solid var(--border-hi);
      border-radius: 20px; padding: 7px 16px; cursor: pointer; transition: all 0.2s;
    }
    .suggestion-btn:hover { background: var(--surface2); border-color: var(--gold-dim); color: var(--gold); }
    .message-row { display: flex; gap: 12px; align-items: flex-start; animation: fadeUp 0.3s ease both; }
    .message-row.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
    .avatar.ai { background: linear-gradient(135deg, #c9a55a, #8a6020); color: #1a1208; font-family: 'Cormorant Garamond', serif; font-size: 16px; box-shadow: 0 2px 10px #c9a55a25; }
    .avatar.user { background: var(--surface2); border: 1px solid var(--border-hi); color: var(--cream-dim); }
    .bubble { max-width: 80%; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
    .bubble.user { background: var(--surface2); border: 1px solid var(--border-hi); border-radius: var(--radius); border-top-right-radius: 5px; padding: 11px 16px; font-size: 13.5px; font-weight: 300; color: var(--cream-dim); }
    .bubble.ai { font-size: 14.5px; font-weight: 300; color: var(--cream); padding: 2px 0; }
    .img-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; animation: fadeUp 0.3s ease both; }
    .img-caption { font-size: 13px; font-weight: 300; color: var(--cream-muted); padding: 0 2px; }
    .img-frame { position: relative; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border-hi); background: var(--surface); max-width: 520px; }
    .img-frame img { width: 100%; display: block; opacity: 0; transition: opacity 0.5s ease; }
    .img-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 200px; }
    .img-loading p { font-size: 12px; font-weight: 300; color: var(--cream-muted); }
    .spinner { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-hi); border-top-color: var(--gold); animation: spin 0.8s linear infinite; }
    .img-open-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 400; color: var(--cream-muted); background: var(--surface); border: 1px solid var(--border-hi); border-radius: 8px; padding: 6px 12px; cursor: pointer; text-decoration: none; transition: color 0.15s, border-color 0.15s; align-self: flex-start; }
    .img-open-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
    .typing-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); border-top-left-radius: 5px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
    .tdot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-dim); }
    .tdot:nth-child(1) { animation: bounce 1.3s infinite 0s; }
    .tdot:nth-child(2) { animation: bounce 1.3s infinite 0.18s; }
    .tdot:nth-child(3) { animation: bounce 1.3s infinite 0.36s; }
    .error-msg { font-size: 12px; font-weight: 300; color: #e07060; text-align: center; padding: 6px 0; }
    footer { border-top: 1px solid var(--border); padding: 16px 0 28px; flex-shrink: 0; }
    .input-shell {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface); border: 1px solid var(--border-hi);
      border-radius: 20px; padding: 10px 10px 10px 18px;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-shell:focus-within { border-color: var(--gold-dim); box-shadow: 0 0 0 3px #c9a55a0d; }
    #user-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'Outfit', sans-serif; font-size: 13.5px; font-weight: 300;
      color: var(--cream); line-height: 1.6; resize: none; min-height: 22px; max-height: 160px; overflow-y: auto;
    }
    #user-input::placeholder { color: var(--cream-faint); }
    #send-btn {
      width: 36px; height: 36px; border-radius: 12px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.2s; flex-shrink: 0;
      background: var(--surface2); color: var(--cream-faint);
    }
    #send-btn.active { background: linear-gradient(135deg, #c9a55a, #a07830); color: #1a1208; box-shadow: 0 2px 12px #c9a55a30; }
    #send-btn.active:hover { opacity: 0.88; transform: scale(1.04); }
    .input-hint { text-align: center; margin-top: 9px; font-size: 10px; font-weight: 300; color: var(--cream-faint); letter-spacing: 0.06em; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="brand">
      <div class="brand-mark">L</div>
      <div>
        <div class="brand-name">Lumis</div>
        <div class="brand-sub">AI Assistant</div>
      </div>
    </div>
    <div class="status-pill"><div class="status-dot"></div> Ready</div>
  </header>

  <div id="chat">
    <div id="empty">
      <div class="empty-glyph">✦</div>
      <div class="empty-title">How can I assist you today?</div>
      <div class="empty-sub">Ask anything, search the web, or say "generate an image of…"</div>
      <div class="suggestions">
        <button class="suggestion-btn">What's in the news today?</button>
        <button class="suggestion-btn">Generate an image of a sunset</button>
        <button class="suggestion-btn">Help me write an email</button>
        <button class="suggestion-btn">Explain a concept</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-shell">
      <textarea id="user-input" rows="1" placeholder="Message Lumis…"></textarea>
      <button id="send-btn">↑</button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line</div>
  </footer>
</div>

<script>
(function() {
  var SYSTEM = 'You are Lumis, a brilliant and refined general-purpose AI assistant with real-time web search. You are warm, clear, and genuinely insightful. Help with anything.\n\nWhen the user asks about current events, news, weather, sports, prices or anything requiring up-to-date info, respond ONLY with this JSON:\n{"action":"search","query":"<your search query>"}\n\nWhen generating images respond ONLY with:\n{"action":"generate_image","prompt":"<detailed prompt>","caption":"<short caption>"}\n\nFor everything else respond normally. After search results, summarize naturally.';

  var messages = [];
  var loading = false;
  var chatEl = document.getElementById('chat');
  var inputEl = document.getElementById('user-input');
  var sendBtn = document.getElementById('send-btn');

  document.querySelectorAll('.suggestion-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      inputEl.value = btn.textContent;
      resizeInput();
      updateBtn();
      inputEl.focus();
    });
  });

  inputEl.addEventListener('input', function() { resizeInput(); updateBtn(); });
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  sendBtn.addEventListener('click', submit);

  function resizeInput() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  }

  function updateBtn() {
    sendBtn.classList.toggle('active', inputEl.value.trim().length > 0);
  }

  function scrollEnd() { chatEl.scrollTop = chatEl.scrollHeight; }

  function clearEmpty() {
    var e = document.getElementById('empty');
    if (e) e.remove();
  }

  function appendMsg(role, text) {
    clearEmpty();
    var row = document.createElement('div');
    row.className = 'message-row ' + role;
    var av = document.createElement('div');
    av.className = 'avatar ' + (role === 'user' ? 'user' : 'ai');
    av.textContent = role === 'user' ? 'You' : 'L';
    var bub = document.createElement('div');
    bub.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');
    bub.textContent = text;
    row.appendChild(av); row.appendChild(bub);
    chatEl.appendChild(row); scrollEnd();
  }

  function appendImage(prompt, caption) {
    clearEmpty();
    var g = document.createElement('div'); g.className = 'img-group';
    var lbl = document.createElement('div'); lbl.className = 'message-row';
    var av = document.createElement('div'); av.className = 'avatar ai'; av.textContent = 'L';
    var cap = document.createElement('p'); cap.className = 'img-caption'; cap.textContent = caption || 'Here is your image.';
    var frame = document.createElement('div'); frame.className = 'img-frame';
    var loader = document.createElement('div'); loader.className = 'img-loading';
    loader.innerHTML = '<div class="spinner"></div><p>Generating…</p>';
    frame.appendChild(loader);
    var seed = Math.floor(Math.random() * 99999);
    var url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=960&height=640&seed=' + seed + '&nologo=true&enhance=true';
    var img = document.createElement('img'); img.alt = prompt;
    img.onload = function() { loader.remove(); img.style.opacity = '1'; scrollEnd(); };
    img.onerror = function() { loader.innerHTML = '<p style="color:#e07060">Failed. Try again.</p>'; };
    img.src = url; frame.appendChild(img);
    var openBtn = document.createElement('a'); openBtn.className = 'img-open-btn';
    openBtn.href = url; openBtn.target = '_blank'; openBtn.rel = 'noopener'; openBtn.textContent = '↗ Open full size';
    g.appendChild(av); g.appendChild(cap); g.appendChild(frame); g.appendChild(openBtn);
    chatEl.appendChild(g); scrollEnd();
  }

  function showTyping() {
    clearEmpty();
    var row = document.createElement('div'); row.id = 'typing-row';
    var av = document.createElement('div'); av.className = 'avatar ai'; av.textContent = 'L';
    var wrap = document.createElement('div'); wrap.className = 'typing-wrap';
    wrap.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
    var outer = document.createElement('div'); outer.className = 'message-row';
    outer.appendChild(av); outer.appendChild(wrap); row.appendChild(outer);
    chatEl.appendChild(row); scrollEnd();
  }

  function hideTyping() { var r = document.getElementById('typing-row'); if (r) r.remove(); }

  function showError(msg) {
    var el = document.createElement('div'); el.className = 'error-msg'; el.textContent = msg;
    chatEl.appendChild(el); scrollEnd();
    setTimeout(function() { el.remove(); }, 6000);
  }

  async function callGroq(msgs) {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    });
    return res.json();
  }

  async function doSearch(query) {
    try {
      var res = await fetch('/api/search?q=' + encodeURIComponent(query));
      var data = await res.json();
      return data.results || 'No results found.';
    } catch(e) {
      return 'Search failed.';
    }
  }

  async function submit() {
    if (loading) return;
    var text = inputEl.value.trim();
    if (!text) return;

    messages.push({ role: 'user', content: text });
    appendMsg('user', text);
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.classList.remove('active');
    loading = true; showTyping();

    try {
      var data = await callGroq([{ role: 'system', content: SYSTEM }].concat(messages));

      if (data.error) {
        hideTyping(); showError(data.error.message || 'Something went wrong.'); messages.pop(); return;
      }

      var reply = (data.choices && data.choices[0].message.content || '').trim();
      messages.push({ role: 'assistant', content: reply });
      hideTyping();

      try {
        var parsed = JSON.parse(reply);
        if (parsed.action === 'generate_image') { appendImage(parsed.prompt, parsed.caption); return; }
        if (parsed.action === 'search') {
          appendMsg('assistant', '🔍 Searching: ' + parsed.query + '…');
          var results = await doSearch(parsed.query);
          messages.push({ role: 'user', content: 'Search results for "' + parsed.query + '":\n' + results + '\nPlease summarize this for the user.' });
          showTyping();
          var data2 = await callGroq([{ role: 'system', content: SYSTEM }].concat(messages));
          var reply2 = (data2.choices && data2.choices[0].message.content || '').trim();
          messages.push({ role: 'assistant', content: reply2 });
          hideTyping();
          appendMsg('assistant', reply2);
          return;
        }
      } catch(e) {}

      appendMsg('assistant', reply);
    } catch(e) {
      hideTyping(); showError('Network error. Please try again.'); messages.pop();
    } finally {
      loading = false;
    }
  }
})();
</script>
</body>
</html>
